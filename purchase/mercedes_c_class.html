<!doctype html>
<html lang="ar">
<head>
  
  <title>Purchase Mercedes C-Class</title>
    <link rel="stylesheet" href="purchase.css">

</head>
<body>
  <div class="box">
    <h1>Purchase Car</h1>
    <img src="../Image/CARS/mercedes-c-.jpg" alt="Mercedes C-Class">
    <h2>Mercedes C-Class</h2>
    <p>Year: 2021</p>

    <form action="../php/databaseCars.php" method="POST">
        <input type="hidden" name="car_id" value="10">
      <input type="hidden" name="car_name" value="Mercedes C-Class">
      <input type="hidden" name="car_year" value="2021">
      <label>Full Name:</label>
      <input type="text" name="full_name" required>
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Phone Number:</label>
      <input type="text" name="phone" required>
      <label>Address:</label>
      <textarea name="address" rows="4" required></textarea>
      <label>Paid Price:</label>
        <input type="text" name="paid_price" required />
      <button type="submit" name="buy_submit">Confirm Purchase</button>
      <a href="../Car.html">Back</a>
    </form>
  </div>
  
</body>
</html>
