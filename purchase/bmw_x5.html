<!doctype html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title>Purchase BMW X5</title>
    <link rel="stylesheet" href="purchase.css">

    </style>
</head>

<body>
    <div class="box">
        <h1>Purchase Car</h1>
        <img src="../Image/CARS/2019_BMW.jpg" alt="BMW X5">
        <h2>BMW X5</h2>
        <p>Year: 2019</p>

        <form action="../php/databaseCars.php" method="POST">
            <input type="hidden" name="car_id" value="3">
            <input type="hidden" name="car_name" value="BMW X5">
            <input type="hidden" name="car_year" value="2019">
            <label>Full Name:</label>
            <input type="text" name="full_name" required>
            <label>Email:</label>
            <input type="email" name="email" required>
            <label>Phone Number:</label>
            <input type="text" name="phone" required>
            <label>Address:</label>
            <textarea name="address" rows="4" required></textarea>
            <label>Paid Price:</label>
            <input type="number" name="paid_price" required>
            <button type="submit" name="buy_submit">Confirm Purchase</button>
            <a href="../Car.html">Back</a>
        </form>
    </div>
    
</body>

</html>
