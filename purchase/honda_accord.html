<!doctype html>
<html lang="ar">
<head>
  
  <title>Purchase Honda Accord</title>
    <link rel="stylesheet" href="purchase.css">

</head>
<body>
  <div class="box">
    <h1>Purchase Car</h1>
    <img src="../Image/CARS/Honda.webp" alt="Honda Accord">
    <h2>Honda Accord</h2>
    <p>Year: 2024</p>

    <form action="../php/databaseCars.php" method="POST">
        <input type="hidden" name="car_id" value="8">
      <input type="hidden" name="car_name" value="Honda Accord">
      <input type="hidden" name="car_year" value="2024">
      <label>Full Name:</label>
      <input type="text" name="full_name" required>
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Phone Number:</label>
      <input type="text" name="phone" required>
      <label>Address:</label>
      <textarea name="address" rows="4" required></textarea>
      <label>Paid Price:</label>
        <input type="text" name="paid_price" required />
      <button type="submit" name="buy_submit">Confirm Purchase</button>
      <a href="../Car.html">Back</a>
    </form>
  </div>
  
</body>
</html>
