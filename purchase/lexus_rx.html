<!doctype html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Purchase Lexus RX</title>
  <style>
    body {font-family: Arial; background:#f4f6f9; margin:0; padding:20px;}
    .box {max-width:800px; margin:auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,.1);}
    img {width:100%; max-width:400px; border-radius:10px; display:block; margin:auto;}
    h1,h2 {text-align:center;}
    p {text-align:center; font-size:18px;}
    input, textarea {width:100%; padding:10px; margin:8px 0 15px; border:1px solid #ccc; border-radius:8px;}
    button, a {display:inline-block; padding:10px 16px; border-radius:8px; text-decoration:none; border:none; cursor:pointer;}
    button {background:#198754; color:#fff;}
    a {background:#6c757d; color:#fff;}
  </style>
</head>
<body>
  <div class="box">
    <h1>Purchase Car</h1>
    <img src="../Image/CARS/lexuxRX.webp" alt="Lexus RX">
    <h2>Lexus RX</h2>
    <p>Year: 2018</p>

    <form action="../php/databaseCars.php" method="POST">
      <input type="hidden" name="car_name" value="Lexus RX">
      <input type="hidden" name="car_year" value="2018">
      <label>Full Name:</label>
      <input type="text" name="full_name" required>
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Phone Number:</label>
      <input type="text" name="phone" required>
      <label>Address:</label>
      <textarea name="address" rows="4" required></textarea>
      <label>Paid Price:</label>
      <input type="number" name="paid_price" required>
      <button type="submit" name="buy_submit">Confirm Purchase</button>
      <a href="../Car.html">Back</a>
    </form>
  </div>
</body>
</html>
