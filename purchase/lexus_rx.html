<!doctype html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Purchase Lexus RX</title>
    <link rel="stylesheet" href="purchase.css">

</head>
<body>
  <div class="box">
    <h1>Purchase Car</h1>
    <img src="../Image/CARS/lexuxRX.webp" alt="Lexus RX">
    <h2>Lexus RX</h2>
    <p>Year: 2018</p>

    <form action="../php/databaseCars.php" method="POST">
        <input type="hidden" name="car_id" value="6">
      <input type="hidden" name="car_name" value="Lexus RX">
      <input type="hidden" name="car_year" value="2018">
      <label>Full Name:</label>
      <input type="text" name="full_name" required>
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Phone Number:</label>
      <input type="text" name="phone" required>
      <label>Address:</label>
      <textarea name="address" rows="4" required></textarea>
      <label>Paid Price:</label>
      <input type="number" name="paid_price" required>
      <button type="submit" name="buy_submit">Confirm Purchase</button>
      <a href="../Car.html">Back</a>
    </form>
  </div>
   
</body>
</html>
