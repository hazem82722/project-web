<!doctype html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Purchase Toyota Camry</title>
  <link rel="stylesheet" href="purchase.css">
</head>
<body>
    <input type="hidden" name="car_id" value="1">
  <div class="box">
    <h1>Purchase Car</h1>
    <img src="../Image/CARS/Toyota_Camry.jpg" alt="Toyota Camry">
    <h2>Toyota Camry</h2>
    <p>Year: 2025</p>

    <form action="../php/databaseCars.php" method="POST">
        <input type="hidden" name="car_id" value="2">
      <input type="hidden" name="car_name" value="Toyota Camry">
      <input type="hidden" name="car_year" value="2025">

      <label>Full Name:</label>
      <input type="text" name="full_name" required>

      <label>Email:</label>
      <input type="email" name="email" required>

      <label>Phone Number:</label>
      <input type="text" name="phone" required>

      <label>Address:</label>
      <textarea name="address" rows="4" required></textarea>

      <label>Paid Price:</label>
      <input type="number" name="paid_price" required>

      <button type="submit" name="buy_submit">Confirm Purchase</button>
      <a href="../Car.html">Back</a>
    </form>
  </div>
  
</body>
</html>
