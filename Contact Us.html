<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="Contact Us.css">
    <title>Contact Us - Car Sales Website</title>
</head>

<body>



    <nav>
        <a href="Home.html"><img src="Image/home.png" width="50px" height="50px"></a>
        <a href="Car.html"><img src="Image/car-icon.png" width="50px" height="50px"></a>
        <a href="AboutUs.html"><img src="Image/aboutus.png" width="50px" height="50px"></a>
        <a href="Contact Us.html"> <img src="Image/contactus.png" width="50px" height="60px"></a>

    </nav>



    <div class="page-container">

        <div class="blue-banner">
            <h1>CONTACT US</h1>
        </div>

        <div class="layout-container">

            <div class="left-column">
                <div class="card">
                    <h3>Contact Information</h3>
                    <p><img src="Image/contactus.png" width="30" height="30" class="icon"> +966 54 154 842</p>
                    <p><img src="Image/Email.webp" width="30" height="30" class="icon"> Cars@gmail.com</p>
                    <p><img src="Image/location.webp" width="30" height="30" class="icon"> Al Madinah Al Munawwarah,
                        Saudi Arabia</p>
                </div>

                <div class="card">
                    <h3>Business Hours</h3>
                    <p>Sunday - Thursday: 9:00 AM - 6:00 PM</p>
                    <p>Friday - Saturday: Closed</p>
                </div>
            </div>

            <div class="right-column">
                <div class="card form-card">
                    <h3>Send Us a Message</h3>
                    <form id="contactForm">
                        <label>Your Email</label>
                        <input type="email" id="emailField"name="user-emaill">

                        <label>Your Message</label>
                        <textarea id="messageField" name="user-message" rows="6"></textarea>

                        <div class="buttons">
                            <button type="submit" class="btn-send">Send Message</button>
                            <button type="reset" class="btn-clear">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
    <script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
        
        if (document.getElementById("emailField").value == "") {
            alert("You must enter an email address");
            e.preventDefault();
        }
        else if (document.getElementById("messageField").value == "") {
            alert("You must enter a message");
            e.preventDefault();
        }

    });
</script>
</body>

</html>
